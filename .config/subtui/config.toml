[app]
# Type of replaygain: 'track', 'album', 'no' https://mpv.io/manual/stable/#options-replaygain
replaygain = 'track'
# Type of gapless playback: 'yes', 'no', 'weak' https://mpv.io/manual/stable/#options-gapless-audio
gapless_playback = 'yes'
desktop_notifications = false
discord_rich_presence = true
mouse_support = true

# Format: ['Light color', 'Dark color']
[theme]
display_album_art = true
subtle = ['#DCD7BA', '#1F1F28']
highlight = ['#E46876', '#C0A36E']
special = ['#98BB6C', '#7E9CD8']
filtered = ['#7A6F4B', '#54546D']

[filters]
# Exclude songs with titles containing these strings
titles = []
# Exclude songs by these artists
artists = []
# Exclude songs by these album artists
album_artists = []
# Exclude songs with a duration shorter than or equal to this length (in seconds), 0 to disable
min_duration = 0
# Exclude songs belonging to these genres
genres = []
# Exclude songs with comments/notes containing these strings
notes = []
# Exclude songs whose file path contains these strings
paths = []
# Exclude songs with a play count less than or equal to this number, 0 to disable
max_play_count = 0
# Set to true to exclude songs that are marked as a favorite/starred
exclude_favorites = false
# Exclude songs with a rating less than or equal to this number (1-5), 0 to disable
max_rating = 0

[keybinds]
[keybinds.global]
cycle_focus_next = ['tab']
cycle_focus_prev = ['shift+tab']
back = ['backspace', 'esc']
help = ['?']
quit = ['q']
hard_quit = ['ctrl+c']

[keybinds.navigation]
up = ['k', 'up']
down = ['j', 'down']
top = ['gg']
bottom = ['G']
select = ['enter']
play_shuffled = ['alt+enter']
go_half_page_up = ['ctrl+u']
go_half_page_down = ['ctrl+d']

[keybinds.search]
focus_search = ['/']
filter_next = ['ctrl+n']
filter_prev = ['ctrl+b']

[keybinds.library]
add_to_playlist = ['A']
add_rating = ['R']
go_to_album = ['ga']
go_to_artist = ['gr']
rate_0 = ['0']
rate_1 = ['1']
rate_2 = ['2']
rate_3 = ['3']
rate_4 = ['4']
rate_5 = ['5']

[keybinds.media]
play_pause = ['p', 'P']
next = ['n']
prev = ['b']
shuffle = ['S']
loop = ['L']
restart = ['w']
rewind = [',']
forward = [';']
volume_up = ['v']
volume_down = ['V']
toggle_media_player = ['m', 'M']

[keybinds.queue]
toggle_queue_view = ['Q']
queue_next = ['N']
queue_last = ['a']
remove_from_queue = ['d']
clear_queue = ['D']
move_up = ['K']
move_down = ['J']

[keybinds.favorites]
toggle_favorite = ['f']
view_favorites = ['F']

[keybinds.other]
toggle_notifications = ['s']
create_share_link = ['ctrl+s']

[columns]
[columns.songs]
track_number = false
title = true
artist = true
album = true
year = false
genre = false
rating = false
play_count = false
duration = true

[columns.albums]
name = true
artist = true
song_count = false
year = false
genre = false
rating = true
duration = true

[columns.artists]
name = true
album_count = true
rating = true
